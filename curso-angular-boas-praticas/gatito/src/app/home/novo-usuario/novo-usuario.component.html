<h4 class="text-center">Registre-se</h4>

<form class="form mt-4" [formGroup]="novoUsuarioForm" (submit)="cadastrar()">
  <div class="form-group">
    <input
      placeholder="e-mail"
      class="form-control"
      formControlName="email"
      name="email"
    />
    <app-mensagem
      mensagem="Email Obrigatório"
      *ngIf="
        novoUsuarioForm.get('email')?.errors?.required &&
        novoUsuarioForm.get('email')?.touched
      "
    >
    </app-mensagem>
    <app-mensagem
      mensagem="E-mail no formato invalido"
      *ngIf="
        novoUsuarioForm.get('email')?.errors?.email &&
        novoUsuarioForm.get('email')?.touched
      "
    ></app-mensagem>
  </div>
  <div class="form-group">
    <input
      placeholder="Nome Completo"
      class="form-control"
      formControlName="fullName"
    />
    <app-mensagem
      mensagem="Nome invalido"
      *ngIf="
        novoUsuarioForm.get('fullName')?.errors &&
        novoUsuarioForm.get('fullName')?.touched
      "
    ></app-mensagem>
  </div>
  <div class="form-group">
    <input
      placeholder="Usuario"
      class="form-control"
      formControlName="userName"
    />
    <app-mensagem
      mensagem="Nome deve estar em minusculo"
      *ngIf="
        novoUsuarioForm.get('userName')?.errors?.minusculo &&
        novoUsuarioForm.get('userName')?.touched
      "
    ></app-mensagem>
    <app-mensagem
      mensagem="Usuário ja existe"
      *ngIf="novoUsuarioForm.get('userName')?.errors?.usuarioExistente"
    ></app-mensagem>
  </div>
  <div class="form-group">
    <input
      placeholder="Senha"
      type="password"
      class="form-control"
      formControlName="password"
    />
    <app-mensagem
    mensagem="Usuário e Senha não podem ser iguais"
    *ngIf="novoUsuarioForm.errors?.senhaIgualUsuario"
  ></app-mensagem>
  </div>
  <button class="btn btn-primary btn-block">Cadastro</button>
</form>

<p>Faça o login <a [routerLink]="['']">Aqui</a></p>
